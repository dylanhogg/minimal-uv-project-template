name: Template CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-template:
    name: Validate Template
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Validate hook syntax
        run: python3 -m py_compile hooks/pre_gen_project.py hooks/post_gen_project.py

      - name: Render default template
        run: |
          rm -rf /tmp/my-project
          uvx cookiecutter --no-input . -o /tmp

      - name: Smoke test default scaffold
        working-directory: /tmp/my-project
        run: |
          uv sync --all-groups
          uv run app reqarg1 --optional-arg optarg1
          uv run python -m my_project.app reqarg1 --optional-arg optarg1
          uv run pytest -q tests

      - name: Render custom-slug template
        run: |
          rm -rf /tmp/acme-tool
          uvx cookiecutter --no-input . -o /tmp project_slug=acme-tool

      - name: Smoke test custom-slug scaffold
        working-directory: /tmp/acme-tool
        run: |
          uv sync --all-groups
          uv run app reqarg1 --optional-arg optarg1
          uv run python -m acme_tool.app reqarg1 --optional-arg optarg1
          uv run pytest -q tests
