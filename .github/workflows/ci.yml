name: Template CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-template:
    name: Validate Template
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install Python 3.13
        run: uv python install 3.13

      - name: Validate hook syntax
        run: python3 -m py_compile hooks/pre_gen_project.py hooks/post_gen_project.py

      - name: Template parity tests
        run: |
          uv run --with pytest==9.0.2 --with cookiecutter==2.6.0 pytest -q tests/template

      - name: Render default scaffold (ubuntu docker parity)
        if: matrix.os == 'ubuntu-latest'
        run: |
          rm -rf /tmp/my-project
          uvx cookiecutter==2.6.0 --no-input . -o /tmp

      - name: Docker parity smoke (ubuntu required)
        if: matrix.os == 'ubuntu-latest'
        working-directory: /tmp/my-project
        run: |
          cp .env_template .env
          uv sync --all-groups
          uv sync --frozen --all-groups
          docker compose run --rm app reqarg1 --optional-arg optarg1
