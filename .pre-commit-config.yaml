repos:
  - repo: local
    hooks:
      - id: hooks-py-compile
        name: hooks-py-compile
        entry: python3 -m py_compile hooks/pre_gen_project.py hooks/post_gen_project.py
        language: system
        pass_filenames: false
      - id: template-render-smoke
        name: template-render-smoke
        entry: python3 hooks/validate_template.py
        language: python
        additional_dependencies: ["cookiecutter==2.6.0"]
        pass_filenames: false
